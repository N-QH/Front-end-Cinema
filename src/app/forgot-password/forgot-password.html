<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2 class="auth-title">Khôi phục mật khẩu</h2>
      <p class="auth-subtitle">
        @if (step === 1) { Vui lòng nhập email đã đăng ký tài khoản của bạn. }
        @else { Vui lòng nhập mã xác nhận được gửi vào email của bạn. }
      </p>
    </div>

    @if (step === 1) {
      <form class="auth-form" (ngSubmit)="requestOtp()">
        <div class="form-group">
          <label for="email">Tài khoản (Email)</label>
          <div class="input-wrapper">
            <i class="fa-regular fa-envelope"></i>
            <input type="email" id="email" name="email" [(ngModel)]="email" placeholder="Nhập email của bạn" required />
          </div>
        </div>
        <button type="submit" class="submit-btn" [disabled]="isLoading">
          @if (isLoading) { Đang gửi mã... }
          @else { Gửi mã xác nhận }
        </button>
      </form>
    } @else {
      <form class="auth-form" (ngSubmit)="resetPassword()">
        <div class="form-group">
          <label for="token">Mã xác nhận (OTP)</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-key"></i>
            <input type="text" id="token" name="token" [(ngModel)]="token" placeholder="VD: 123456" required />
          </div>
        </div>
        <div class="form-group">
          <label for="newPassword">Mật khẩu mới</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="newPassword" name="newPassword" [(ngModel)]="newPassword" placeholder="Nhập mật khẩu mới" required />
          </div>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Xác nhận mật khẩu</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="confirmPassword" name="confirmPassword" [(ngModel)]="confirmPassword" placeholder="Nhập lại mật khẩu mới" required />
          </div>
        </div>
        <button type="submit" class="submit-btn" [disabled]="isLoading">
          @if (isLoading) { Đang xử lý... }
          @else { Đặt lại mật khẩu }
        </button>
      </form>
    }

    <p class="auth-footer">
      Bạn đã nhớ mật khẩu? 
      <a routerLink="/auth" class="register-link">Quay lại đăng nhập</a>
    </p>
  </div>
</div>
