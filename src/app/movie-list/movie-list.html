<div class="movie-list">
  @if (isLoading) {
    <div style="padding: 40px; text-align: center; color: var(--text-secondary);">
      Loading movies...
    </div>
  } @else {
    @for (movie of movies; track movie.id) {
      <app-movie-item [movie]="movie"></app-movie-item>
    }
  }
  <app-pagination></app-pagination>
</div>
