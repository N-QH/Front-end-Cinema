<div class="movie-section">
  <div class="movie-list-container">
    @if (isLoading) {
      <div class="loading-state">Đang tải danh sách phim...</div>
    } @else {
      @for (movie of pagedMovies; track movie.id) {
        <app-movie-item [movie]="movie" [gridMode]="true"></app-movie-item>
      } @empty {
        <div class="empty-state">Hiện chưa có phim nào khởi chiếu.</div>
      }
    }
  </div>
  
  @if (totalPages > 1) {
    <app-pagination 
      [currentPage]="currentPage" 
      [totalPages]="totalPages" 
      (pageChange)="onPageChange($any($event))">
    </app-pagination>
  }
</div>
