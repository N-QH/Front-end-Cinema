<div class="movie-item" [routerLink]="['/movie', movie?.id]" style="cursor: pointer;">
  <div class="movie-image-placeholder">
    <!-- Abstract shapes inside placeholder snippet -->
    <div class="mini-shape mini-shape-1"></div>
    <div class="mini-shape mini-shape-2"></div>
    <div class="mini-shape mini-shape-3"></div>
  </div>
  
  <div class="movie-info">
    <div class="movie-header">
      <h3 class="movie-title">{{ movie?.movieName || 'Loading...' }}</h3>
      <div class="movie-meta">
        <div class="stars">
          <i class="fa-solid fa-star"></i>
          <span style="font-size: 14px; margin-left: 4px; font-weight: 500;">{{ movie?.rating || 0 }}</span>
        </div>
        <button class="favorite-btn" (click)="$event.stopPropagation()">
          <i class="fa-regular fa-heart"></i>
        </button>
      </div>
    </div>
    
    <div class="movie-subtitle">
      <span class="age-badge" style="background: rgba(239, 68, 68, 0.1); color: #ef4444; padding: 2px 6px; border-radius: 4px; font-weight: 700; margin-right: 6px;">{{ movie?.ageRequirement ? movie.ageRequirement + '+' : 'P' }}</span>
      {{ movie?.genre }} &bull; {{ movie?.language }} &bull; {{ movie?.duration }} phút
    </div>
    
    <div class="movie-description">
      Khởi chiếu: {{ movie?.releaseDate | date:'dd/MM/yyyy' }}
    </div>
  </div>
</div>
