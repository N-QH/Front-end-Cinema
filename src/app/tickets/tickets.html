<div class="tickets-container">
  <div class="tickets-header">
    <button class="back-btn" routerLink="/">
      <i class="fa-solid fa-arrow-left"></i> Trang chủ
    </button>
    <h2>Quản lý vé của tôi</h2>
    <div class="header-placeholder"></div>
  </div>

  <div class="tickets-content">
    
    <div class="tabs">
      <button class="tab active">Vé sắp xem</button>
      <button class="tab">Vé đã xem</button>
    </div>

    <div class="ticket-list">
      <!-- A detailed ticket card example -->
      <div class="ticket-stub-card">
        <div class="ticket-visual">
          <div class="movie-poster placeholder-poster">
            <i class="fa-solid fa-image"></i>
          </div>
        </div>

        <div class="ticket-details">
          <span class="status-badge valid">Sắp chiếu</span>
          <h3 class="movie-title">Mưa đỏ</h3>
          <p class="movie-type">2D Phụ đề Tiếng Việt</p>
          
          <div class="info-grid">
            <div class="info-group">
              <span class="label">Rạp</span>
              <span class="value">CGV Vincom Center</span>
            </div>
            <div class="info-group">
              <span class="label">Phòng chiếu</span>
              <span class="value">CINEMA 5</span>
            </div>
            <div class="info-group">
              <span class="label">Ngày</span>
              <span class="value">12/10/2026</span>
            </div>
            <div class="info-group">
              <span class="label">Giờ chiếu</span>
              <span class="value">12:00</span>
            </div>
            <div class="info-group">
              <span class="label">Ghế</span>
              <span class="value seat-value">A7, A8</span>
            </div>
            <div class="info-group">
              <span class="label">Mã đặt chỗ</span>
              <span class="value codes">8AB29C</span>
            </div>
          </div>
        </div>

        <div class="ticket-qr-section">
          <div class="qr-code-placeholder">
            <i class="fa-solid fa-qrcode"></i>
          </div>
          <p class="instruction">Đưa mã này cho nhân viên soát vé</p>
        </div>
      </div>
    </div>

  </div>
</div>
