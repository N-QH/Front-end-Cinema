<header class="app-header">
  <div class="header-left">
    <button class="menu-btn">
      <i class="fa-solid fa-bars"></i>
    </button>
  </div>
  
  <nav class="header-nav">
    <a routerLink="/" [routerLinkActiveOptions]="{exact: true}" routerLinkActive="active" class="nav-item">Phim</a>
    <a routerLink="/cinemas" routerLinkActive="active" class="nav-item">Rạp chiếu</a>
    <a routerLink="/category" routerLinkActive="active" class="nav-item">Thể loại</a>
  </nav>

  <div class="header-right">
    <div class="search-bar">
      <input type="text" placeholder="Search" />
      <i class="fa-solid fa-magnifying-glass search-icon"></i>
    </div>
    
    @if (authService.currentUserValue) {
      <div class="auth-section logged-in">
        <span class="auth-text" (click)="logout($event)" style="margin-right: 15px;">Đăng xuất</span>
        <div class="user-avatar" routerLink="/tickets" title="Tickets" style="margin-right: 10px;">
          <i class="fa-solid fa-ticket"></i>
        </div>
        <div class="user-avatar" routerLink="/profile" title="Profile" style="margin-right: 10px;">
          <i class="fa-regular fa-user"></i>
        </div>
        <div class="user-avatar" routerLink="/settings" title="Settings" style="margin-right: 10px;">
          <i class="fa-solid fa-gear"></i>
        </div>
        @if (isAdmin) {
          <div class="user-avatar" routerLink="/admin" title="Admin">
            <i class="fa-solid fa-shield-halved"></i>
          </div>
        }
      </div>
    } @else {
      <div class="auth-section" routerLink="/auth">
        <span class="auth-text">Đăng nhập/ Đăng ký</span>
        <div class="user-avatar">
          <i class="fa-regular fa-user"></i>
        </div>
      </div>
    }
  </div>
</header>
