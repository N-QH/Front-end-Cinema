<div class="profile-container">
  <div class="profile-header">
    <button class="back-btn" routerLink="/">
      <i class="fa-solid fa-arrow-left"></i> Trang chủ
    </button>
    <h2>Hồ sơ của tôi</h2>
    <div class="header-placeholder"></div>
  </div>

  <div class="profile-content">
    @if (isLoading) {
      <div style="text-align: center; padding: 40px; color: var(--text-secondary);">Đang tải thông tin...</div>
    } @else {
      <div class="profile-card">
        
        <div class="profile-avatar-section">
          <div class="avatar-wrapper" style="position: relative; display: inline-block;">
            <img [src]="userProfile.userImage || 'https://ui-avatars.com/api/?name=' + userProfile.name + '&background=7c3aed&color=fff'" alt="Avatar" class="profile-avatar" />
            <input type="file" (change)="onProfileImageSelected($event)" accept="image/*" style="display: none;" #avatarInput>
            <button type="button" class="btn-cancel" style="position: absolute; bottom: 0; right: 0; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; padding: 0; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 2px solid var(--bg-card); cursor: pointer;" (click)="avatarInput.click()" title="Đổi ảnh đại diện">
              @if (isUploadingAvatar) {
                <i class="fa-solid fa-circle-notch fa-spin"></i>
              } @else {
                <i class="fa-solid fa-camera"></i>
              }
            </button>
          </div>
          <h3 class="profile-name">{{ userProfile.name }}</h3>
          <p class="profile-role">
            {{ userProfile.roles?.includes('ADMIN') ? 'Quản trị viên' : 'Khách hàng' }} | ID: {{ userProfile.id }}
          </p>
        </div>

        <form (ngSubmit)="onSubmit()" class="profile-form">
          <div class="form-group">
            <label>Họ và Tên</label>
            <input type="text" [(ngModel)]="userProfile.name" name="name" required class="form-input">
          </div>
          
          <div class="form-group">
            <label>Email</label>
            <input type="email" [(ngModel)]="userProfile.email" name="email" required class="form-input" readonly>
          </div>

          <div class="form-group">
            <label>Số điện thoại</label>
            <input type="tel" [(ngModel)]="userProfile.mobileNo" name="mobile" required class="form-input">
          </div>

          <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px;">
            <div class="form-group" style="margin-bottom: 0;">
              <label>Ngày sinh</label>
              <input type="date" [(ngModel)]="userProfile.dateOfBirth" name="dateOfBirth" class="form-input">
            </div>
            <div class="form-group" style="margin-bottom: 0;">
              <label>Giới tính</label>
              <select [(ngModel)]="userProfile.gender" name="gender" class="form-input">
                <option value="MALE">Nam</option>
                <option value="FEMALE">Nữ</option>
                <option value="OTHER">Khác</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label>Địa chỉ</label>
            <input type="text" [(ngModel)]="userProfile.address" name="address" class="form-input" placeholder="Nhập địa chỉ của bạn">
          </div>

          <div class="form-group">
            <label>Mật khẩu mới (Bỏ trống nếu không đổi)</label>
            <input type="password" [(ngModel)]="newPassword" name="newPassword" class="form-input" placeholder="Nhập phần mật khẩu muốn đổi" autocomplete="new-password">
          </div>
          


          <div class="form-actions">
            <button type="submit" [disabled]="isSaving" class="primary-btn submit-btn">
              {{ isSaving ? 'Đang lưu...' : 'Lưu Thay Đổi' }}
            </button>
          </div>
        </form>

      </div>
    }
  </div>
</div>
