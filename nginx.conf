server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend service
    # We match common backend patterns or just rely on FE's environment.ts
    # Redirecting /api to the backend container
    location /movie/ {
        proxy_pass http://backend:8080/movie/;
    }
    location /user/ {
        proxy_pass http://backend:8080/user/;
    }
    location /ticket/ {
        proxy_pass http://backend:8080/ticket/;
    }
    location /show/ {
        proxy_pass http://backend:8080/show/;
    }
    location /theater/ {
        proxy_pass http://backend:8080/theater/;
    }
    location /dashboard/ {
        proxy_pass http://backend:8080/dashboard/;
    }
    location /coupon/ {
        proxy_pass http://backend:8080/coupon/;
    }
    location /auth/ {
        proxy_pass http://backend:8080/auth/;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
